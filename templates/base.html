{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DevTrack</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
    <link rel="stylesheet" type="text/css" href="{% static 'css/style.css' %}">
</head>
<body>

<!-- Sidebar -->
<div class="d-flex">
    <div class="sidebar bg-light">
        <div class="p-3">
            <h4 class="text-center"><i class="bi bi-kanban"></i> DevTrack</h4>
            <hr>
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a href="{% url 'TaskTracker:index' %}" class="nav-link active">
                        <i class="bi bi-house-door"></i> Home
                    </a>
                </li>
                <li>
                    <a href="{% url 'TaskTracker:task_list' %}" class="nav-link">
                        <i class="bi bi-list-task"></i> Task List
                    </a>
                </li>
                <li>
                    <a href="{% url 'TaskTracker:project_list' %}" class="nav-link">
                        <i class="bi bi-folder"></i> Projects
                    </a>
                </li>
                <li>
                    <a href="{% url 'TaskTracker:team_list' %}" class="nav-link">
                        <i class="bi bi-people"></i> Teams
                    </a>
                </li>
            </ul>
        </div>
    </div>

    <div class="content p-4">
        {% block content %}
        {% endblock %}
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
