{% extends "base.html" %}

{% block content %}
  <h1 class="text-center mb-4">Delete Project</h1>

  <div class="alert alert-warning">
    <p>Are you sure you want to delete the project <strong>{{ project.name }}</strong>?</p>
  </div>

  <form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Delete</button>
    <a href="{% url 'TaskTracker:project_list' %}" class="btn btn-secondary">Cancel</a>
  </form>
{% endblock %}
