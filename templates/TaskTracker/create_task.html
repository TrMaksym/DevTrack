{% extends 'base.html' %}

{% block content %}
  <h1 class="text-center mb-4">Create a New Task</h1>

  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}  <!-- Виводимо форму в стилі P для зручного форматування -->

    <button type="submit" class="btn btn-primary">Create Task</button>
  </form>
{% endblock %}
