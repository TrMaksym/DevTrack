<!DOCTYPE html>
<html lang="en">
<head>
  <title>Task Tracker</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
  <div class="container mt-5">
    <h1 class="text-center mb-4">Hello, and welcome to DevTrack!</h1>
    <p class="lead text-center mb-4">DevTrack is a task manager for IT companies where you can track project progress, manage teams and tasks, and effectively interact with all participants.</p>

    <h2 class="mb-3">Last Tasks</h2>
    <ul class="list-group">
      <li class="list-group-item">Task #1 - Status: Completed</li>
      <li class="list-group-item">Task #2 - Status: In progress</li>
      <li class="list-group-item">Task #3 - Status: Pending</li>
    </ul>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-pzjw8f+ua7Kw1TIq0A5Tjqb1vIUEqkCmTlTAzk3bZG1I61GrFcX7F0cD4wOwZMlF" crossorigin="anonymous"></script>
</body>
</html>
