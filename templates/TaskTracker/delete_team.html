{% extends 'base.html' %}

{% block content %}
<h1>Delete Team</h1>

<p>Are you sure you want to delete the team <strong>{{ team.name }}</strong>?</p>

<form method="POST">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Yes, Delete</button>
    <a href="{% url 'TaskTracker:team_list' %}" class="btn btn-secondary">Cancel</a>
</form>

{% endblock %}
