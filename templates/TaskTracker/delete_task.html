{% extends "base.html" %}

{% block content %}
  <h1 class="text-center mb-4">Delete Task</h1>

  <div class="alert alert-warning">
    <p>Are you sure you want to delete the task <strong>{{ task.title }}</strong>?</p>
  </div>

  <form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Delete Task</button>
    <a href="{% url 'TaskTracker:task_list' %}" class="btn btn-secondary">Cancel</a>
  </form>

{% endblock %}
