{% extends "base.html" %}
{% load crispy_forms_filters %}

{% block content %}
	<div class="container">
  <h2 class="mt-4">Update Project</h2>
  <form method="post">
    {% csrf_token %}
    {{ form|crispy }}
    <button type="submit" class="btn btn-primary">Update</button>
    <a href="{% url 'TaskTracker:project_list' %}" class="btn btn-secondary">Cancel</a>
  </form>
  </div>
{% endblock %}
